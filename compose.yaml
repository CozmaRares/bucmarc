services:
    migrate:
        build:
            context: .
            dockerfile: Dockerfile
            target: builder
        env_file:
            - .env
        volumes:
            - ./server-data:/app/data
            - ./drizzle:/app/drizzle
            - ./drizzle.config.ts:/app/drizzle.config.ts
        command:
            - bun
            - run
            - ${DRIZZLE_UDATE_DB_COMMAND}
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "3"

    server:
        build: .
        env_file:
            - .env
        environment:
            PORT: 3000
            FORCE_COLOR: 1
        volumes:
            - ./server-data:/app/data
            - ./public:/app/public
        depends_on:
            migrate:
                condition: service_completed_successfully
        networks:
            - appnet
        logging:
            driver: json-file
            options:
                max-size: "20m"
                max-file: "5"

    nginx:
        image: nginx:1.30.2-alpine
        depends_on:
            server:
                condition: service_started
        ports:
            - "0.0.0.0:80:80"
            - "0.0.0.0:443:443"
            - "[::]:80:80"
            - "[::]:443:443"
        volumes:
            - ${NGINX_CONFIG}:/etc/nginx/conf.d/default.conf:ro
            - /etc/letsencrypt:/etc/letsencrypt
        networks:
            - appnet
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"

networks:
    appnet:
        enable_ipv6: true
        ipam:
            config:
                - subnet: "fd00:cafe:babe:1::/64"
